<div #editorCanvas class="editor-canvas" [class.connecting-mode]="connecting" (dragover)="onCanvasDragOver($event)"
    (drop)="onCanvasDrop($event)" (click)="onCanvasClick()">
    <!-- Layer 1: Nodes -->
    @for (node of nodes; track node.id) {
    <div class="workflow-node" [class.selected]="node.selected" [class.active]="node.active"
        [class.connecting-source]="connecting && connectingFromId === node.id"
        [class.connecting-target]="connecting && connectingFromId !== node.id"
        [ngClass]="'node-' + node.type.toLowerCase()" [style.left.px]="node.x" [style.top.px]="node.y"
        (mousedown)="onNodeMouseDown($event, node)" (click)="onNodeClick($event, node)">
        <div class="node-card">
            <div class="node-header">
                <i class="pi" [ngClass]="getNodeIcon(node.type)"></i>
                <span>{{ getNodeLabel(node.type) }}</span>
            </div>
            <div class="node-body">
                <div class="node-name">{{ getNodeDisplayName(node) }}</div>
                <small class="node-id">{{ node.id.startsWith('temp-') ? '● Nuevo' : node.id.substring(0, 8) + '...'
                    }}</small>
            </div>
        </div>
        <!-- Connector dot -->
        @if (node.type !== 'IF') {
        <div class="connector connector-out" (click)="onConnectorClick($event, node)" title="Conectar desde aquí"></div>
        } @else {
        <div class="connector connector-out connector-true" (click)="onConnectorClick($event, node, 'true')"
            title="Conectar rama Verdadera (True)"></div>
        <div class="connector connector-out connector-false" (click)="onConnectorClick($event, node, 'false')"
            title="Conectar rama Falsa (False)"></div>
        }
    </div>
    }

    <!-- Layer 2: Connections (Rendered on top but transparent to most events) -->
    <svg class="connections-layer">
        @for (conn of getConnections(); track conn.id) {
        <g class="connection-group">
            <path [attr.d]="getConnectionPath(conn.from, conn.to, conn.handle)" fill="none" class="connection-line"
                [class.active-line]="conn.from.active || conn.to.active" />
            <polygon [attr.points]="getArrowPoints(conn.from, conn.to, conn.handle)" class="connection-arrow"
                [class.active-line]="conn.from.active || conn.to.active" />

            <!-- Interactive Delete Button -->
            <g class="delete-link" (click)="onDeleteConnection($event, conn.id)"
                [attr.transform]="'translate(' + getDeleteButtonPos(conn.from, conn.to, conn.handle).x + ',' + getDeleteButtonPos(conn.from, conn.to, conn.handle).y + ')'">
                <circle r="12" fill="#ef4444" stroke="white" stroke-width="2" />
                <path d="M -4 -4 L 4 4 M -4 4 L 4 -4" stroke="white" stroke-width="2" stroke-linecap="round" />
            </g>
        </g>
        }
    </svg>
</div>
